# Spring Boot Application Configuration
spring:
  # Application Name
  application:
    name: student-selection-system
  
  # Allow circular references
  main:
    allow-circular-references: true
  
  # Database Configuration - MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/student_selection_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  
  # SQL初始化配置
  sql:
    init:
      schema-locations: classpath:database_init.sql
      data-locations: classpath:database_init.sql
      mode: never
  
  # Thymeleaf Configuration
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  
  # Jackson Configuration
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  
  # DevTools Configuration
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

# Server Configuration
server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8

# MyBatis Plus Configuration
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.example.studentselectionsystem.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT Configuration
jwt:
  secret: student-selection-system-secret-key-2024
  expiration: 86400000  # 24 hours in milliseconds
  header: Authorization

# Logging Configuration
logging:
  level:
    root: debug
    com.example.studentselectionsystem: debug
    org.springframework.web: debug
    org.apache.catalina: debug
    org.springframework.security: debug
  file:
    name: logs/student-selection-system.log
    max-size: 10MB
    max-history: 7
