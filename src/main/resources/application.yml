# Spring Boot Application Configuration
spring:
  # Application Name
  application:
    name: student-selection-system
  
  # Allow circular references
  main:
    allow-circular-references: true
  
  # Database Configuration - MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/student_selection_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  
  # SQL初始化配置
  sql:
    init:
      schema-locations: classpath:database_init.sql
      mode: never
      platform: mysql

  # Thymeleaf Configuration
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  
  # Jackson Configuration
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  
  # DevTools Configuration
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  
  # File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB  # 单个文件最大大小
      max-request-size: 10MB  # 整个请求的最大大小
      
  # Email Configuration
  mail:
    host: smtp.qq.com  # 已修正为QQ邮箱SMTP地址
    port: 465  # QQ邮箱SSL端口465
    username: 2436136932@qq.com  # 你的QQ邮箱
    password: hgbuvkojlctgdjbe  # 你的QQ邮箱授权码（核对有效性）
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true  # 开启SSL加密（适配465端口，替代starttls）
      debug: true
      
# File Storage Configuration
file:
  storage:
    dir: G:/javacode/student-selection-system/uploads/  # 文件存储目录（使用绝对路径）
    allowed-extensions: docx,doc,pdf,pptx,ppt,png,jpg,jpeg  # 允许的文件扩展名

# Server Configuration
server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8

# MyBatis Plus Configuration
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.example.studentselectionsystem.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT Configuration
jwt:
  secret: student-selection-system-secret-key-2024
  expiration: 86400000  # 24 hours in milliseconds
  header: Authorization

# Logging Configuration
logging:
  level:
    root: info
    com.example.studentselectionsystem: info
    org.springframework.web: info
    org.apache.catalina: info
    org.springframework.security: info
    org.springframework.boot.sql.init: debug
    org.springframework.jdbc: debug
    com.baomidou: debug
  file:
    name: logs/student-selection-system.log
    max-size: 10MB
    max-history: 7
