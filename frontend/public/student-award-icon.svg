<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- 深色背景渐变 -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>

    <!-- 霓虹蓝渐变 -->
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>

    <!-- 霓虹青渐变 -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00fff2"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>

    <!-- 霓虹金渐变 -->
    <linearGradient id="neonGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>

    <!-- 星星渐变 -->
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbe6"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>

    <!-- 霓虹发光滤镜 - 蓝 -->
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feFlood flood-color="#00d4ff" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur1" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 霓虹发光滤镜 - 金 -->
    <filter id="glowGold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur1" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 霓虹发光滤镜 - 青 -->
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur1"/>
      <feFlood flood-color="#00fff2" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur1" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 柔和发光 -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 电路纹理裁剪 -->
    <clipPath id="hexClip">
      <polygon points="60,8 103,30 103,78 60,100 17,78 17,30"/>
    </clipPath>
  </defs>

  <!-- ===== 背景层 ===== -->
  <circle cx="60" cy="60" r="56" fill="url(#bgGrad)"/>

  <!-- 外圈旋转装饰环 -->
  <g opacity="0.3">
    <circle cx="60" cy="60" r="52" fill="none" stroke="#00d4ff" stroke-width="0.5" stroke-dasharray="4,8"/>
    <circle cx="60" cy="60" r="48" fill="none" stroke="#0066ff" stroke-width="0.3" stroke-dasharray="2,12"/>
  </g>

  <!-- 外圈刻度标记 -->
  <g stroke="#00d4ff" stroke-width="0.8" opacity="0.4">
    <line x1="60" y1="5" x2="60" y2="10"/>
    <line x1="60" y1="110" x2="60" y2="115"/>
    <line x1="5" y1="60" x2="10" y2="60"/>
    <line x1="110" y1="60" x2="115" y2="60"/>
    <line x1="22" y1="22" x2="25.5" y2="25.5"/>
    <line x1="94.5" y1="94.5" x2="98" y2="98"/>
    <line x1="98" y1="22" x2="94.5" y2="25.5"/>
    <line x1="25.5" y1="94.5" x2="22" y2="98"/>
  </g>

  <!-- ===== 六边形外框 ===== -->
  <polygon points="60,10 101,31 101,77 60,98 19,77 19,31"
           fill="none" stroke="url(#neonBlue)" stroke-width="1.5" filter="url(#glowBlue)" opacity="0.9"/>

  <!-- 六边形内框 -->
  <polygon points="60,16 96,34 96,74 60,92 24,74 24,34"
           fill="rgba(0,20,40,0.6)" stroke="#00d4ff" stroke-width="0.5" opacity="0.5"/>

  <!-- ===== 电路纹理 ===== -->
  <g clip-path="url(#hexClip)" opacity="0.25" stroke="#00d4ff" stroke-width="0.6" fill="none">
    <!-- 水平电路线 -->
    <line x1="17" y1="40" x2="45" y2="40"/>
    <line x1="75" y1="40" x2="103" y2="40"/>
    <line x1="17" y1="65" x2="35" y2="65"/>
    <line x1="85" y1="65" x2="103" y2="65"/>

    <!-- 垂直电路线 -->
    <line x1="45" y1="30" x2="45" y2="50"/>
    <line x1="75" y1="30" x2="75" y2="50"/>
    <line x1="35" y1="65" x2="35" y2="80"/>
    <line x1="85" y1="65" x2="85" y2="80"/>

    <!-- 电路节点 -->
    <circle cx="45" cy="40" r="2" fill="#00d4ff"/>
    <circle cx="75" cy="40" r="2" fill="#00d4ff"/>
    <circle cx="35" cy="65" r="2" fill="#00d4ff"/>
    <circle cx="85" cy="65" r="2" fill="#00d4ff"/>
    <circle cx="45" cy="50" r="1.5" fill="#00d4ff"/>
    <circle cx="75" cy="50" r="1.5" fill="#00d4ff"/>

    <!-- 对角电路 -->
    <polyline points="45,50 52,55 52,65"/>
    <polyline points="75,50 68,55 68,65"/>
  </g>

  <!-- ===== 中心奖章区域 ===== -->
  <!-- 奖章底光 -->
  <circle cx="60" cy="50" r="22" fill="#ffd700" opacity="0.08" filter="url(#softGlow)"/>

  <!-- 奖章主体 - 科技感六角星 -->
  <polygon points="60,28 72,38 72,54 60,64 48,54 48,38"
           fill="rgba(0,15,30,0.8)" stroke="url(#neonGold)" stroke-width="1.8" filter="url(#glowGold)"/>

  <!-- 奖章内圈 -->
  <polygon points="60,33 68,40 68,52 60,59 52,52 52,40"
           fill="none" stroke="#ffd700" stroke-width="0.6" opacity="0.5" stroke-dasharray="2,3"/>

  <!-- 中心五角星 -->
  <polygon points="60,36 63,44 71,44 65,49 67,57 60,53 53,57 55,49 49,44 57,44"
           fill="url(#starGrad)" stroke="#ffd700" stroke-width="0.5" filter="url(#glowGold)"/>

  <!-- 星星中心高光 -->
  <circle cx="58" cy="44" r="3" fill="#fff" opacity="0.3"/>

  <!-- ===== 数据流粒子效果 ===== -->
  <g fill="#00fff2" opacity="0.7">
    <circle cx="30" cy="28" r="1.2" filter="url(#glowCyan)"/>
    <circle cx="90" cy="28" r="1" filter="url(#glowCyan)"/>
    <circle cx="25" cy="70" r="0.8" filter="url(#glowCyan)"/>
    <circle cx="95" cy="70" r="1.1" filter="url(#glowCyan)"/>
    <circle cx="42" cy="18" r="0.7"/>
    <circle cx="78" cy="18" r="0.9"/>
    <circle cx="38" cy="88" r="0.8"/>
    <circle cx="82" cy="88" r="0.7"/>
  </g>

  <!-- ===== 底部书本 - 科技风格 ===== -->
  <g transform="translate(40, 74)" filter="url(#glowCyan)">
    <!-- 书本左页 -->
    <path d="M0 6 Q10 2 20 6 L20 18 Q10 14 0 18 Z"
          fill="rgba(0,30,50,0.9)" stroke="#00d4ff" stroke-width="0.8"/>
    <!-- 书本右页 -->
    <path d="M20 6 Q30 2 40 6 L40 18 Q30 14 20 18 Z"
          fill="rgba(0,30,50,0.9)" stroke="#00d4ff" stroke-width="0.8"/>
    <!-- 书脊 -->
    <rect x="19" y="6" width="2" height="12" fill="#00d4ff" opacity="0.8"/>
    <!-- 数据线条 -->
    <line x1="3" y1="9" x2="17" y2="7" stroke="#00fff2" stroke-width="0.4" opacity="0.6"/>
    <line x1="3" y1="12" x2="17" y2="10" stroke="#00fff2" stroke-width="0.4" opacity="0.6"/>
    <line x1="3" y1="15" x2="17" y2="13" stroke="#00fff2" stroke-width="0.4" opacity="0.6"/>
    <line x1="23" y1="7" x2="37" y2="9" stroke="#00fff2" stroke-width="0.4" opacity="0.6"/>
    <line x1="23" y1="10" x2="37" y2="12" stroke="#00fff2" stroke-width="0.4" opacity="0.6"/>
    <line x1="23" y1="13" x2="37" y2="15" stroke="#00fff2" stroke-width="0.4" opacity="0.6"/>
  </g>

  <!-- ===== 角落装饰 - 科技三角 ===== -->
  <g stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.5">
    <!-- 左上 -->
    <polyline points="14,20 14,14 20,14"/>
    <!-- 右上 -->
    <polyline points="100,20 106,14 106,20" transform="translate(0,0)"/>
    <polyline points="106,14 100,14"/>
    <!-- 左下 -->
    <polyline points="14,100 14,106 20,106"/>
    <!-- 右下 -->
    <polyline points="106,100 106,106 100,106"/>
  </g>

  <!-- ===== HUD 弧线装饰 ===== -->
  <g fill="none" stroke-width="0.8" opacity="0.35">
    <path d="M30 15 A50 50 0 0 1 50 10" stroke="#00d4ff"/>
    <path d="M70 10 A50 50 0 0 1 90 15" stroke="#00d4ff"/>
    <path d="M30 105 A50 50 0 0 0 50 110" stroke="#0066ff"/>
    <path d="M70 110 A50 50 0 0 0 90 105" stroke="#0066ff"/>
  </g>

  <!-- 顶部小标签 -->
  <g filter="url(#glowCyan)" opacity="0.7">
    <rect x="46" y="3" width="28" height="8" rx="1" fill="rgba(0,20,40,0.9)" stroke="#00fff2" stroke-width="0.5"/>
    <text x="60" y="9" text-anchor="middle" font-family="monospace" font-size="5" fill="#00fff2" font-weight="bold">AWARD</text>
  </g>
</svg>
